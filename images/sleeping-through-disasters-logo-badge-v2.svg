<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <!-- Subtle gradient for the white background to give it depth -->
    <radialGradient id="bgGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F5F5F5;stop-opacity:1" />
    </radialGradient>
    
    <!-- Subtle shadow for the fedora -->
    <filter id="hatShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="1" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.25"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer circle (badge) - white with red outline -->
  <circle cx="200" cy="200" r="190" fill="url(#bgGradient)" stroke="#EE0000" stroke-width="6"/>
  <!-- Inner ring for depth -->
  <circle cx="200" cy="200" r="178" fill="none" stroke="#EE0000" stroke-width="1.5" opacity="0.4"/>

  <!-- Stars decoration (subtle, for atmosphere) -->
  <g fill="#EE0000" opacity="0.25">
    <circle cx="80" cy="120" r="2"/>
    <circle cx="320" cy="100" r="1.5"/>
    <circle cx="100" cy="280" r="1.5"/>
    <circle cx="310" cy="290" r="2"/>
    <circle cx="60" cy="200" r="1.5"/>
    <circle cx="340" cy="200" r="1.5"/>
    <circle cx="350" cy="150" r="1"/>
    <circle cx="55" cy="160" r="1.2"/>
  </g>

  <!-- Crescent moon top -->
  <g transform="translate(200, 92)">
    <path d="M 0 -16 A 19 19 0 1 0 16 0 A 15 15 0 1 1 0 -16 Z" 
          fill="#EE0000" opacity="0.85"/>
  </g>

  <!-- Stylized fedora - clearly illustrative, our own interpretation -->
  <g transform="translate(200, 210)" filter="url(#hatShadow)">
    <!-- 
      Fedora is drawn with:
      - Slightly different proportions than the official Red Hat mark
      - Visible band detail
      - Pinch in the crown (typical fedora detail) 
      This is a stylized illustration of a generic fedora, not the trademark.
    -->
    
    <!-- Hat brim (wider, more pronounced than official mark) -->
    <ellipse cx="0" cy="22" rx="92" ry="13" fill="#EE0000"/>
    <!-- Brim highlight (top) -->
    <ellipse cx="0" cy="20" rx="92" ry="11" fill="#FF1A1A" opacity="0.4"/>
    
    <!-- Hat crown body -->
    <path d="M -68 22 
             Q -73 -18 -55 -35 
             Q -32 -54 0 -54 
             Q 32 -54 55 -35
             Q 73 -18 68 22 
             Z" fill="#EE0000"/>
    
    <!-- Crown pinch detail (typical fedora indentation) -->
    <path d="M -22 -48 
             Q -10 -42 0 -45
             Q 10 -42 22 -48" 
          stroke="#A30000" stroke-width="2" fill="none" opacity="0.5"/>
    
    <!-- Hat band (black, distinctive of classic fedoras) -->
    <path d="M -65 18 
             Q -68 6 -62 0 
             L 62 0 
             Q 68 6 65 18 
             Z" fill="#1a1a1a"/>
    
    <!-- Band highlight -->
    <path d="M -62 16 
             Q -64 8 -60 4 
             L 60 4
             Q 64 8 62 16 
             Z" fill="#333333" opacity="0.6"/>
    
    <!-- Crown highlight (left side, gives 3D feel) -->
    <path d="M -50 -32 
             Q -35 -45 -10 -48 
             Q -25 -42 -40 -28
             Q -45 -25 -50 -32 
             Z" fill="#FF3333" opacity="0.5"/>
  </g>

  <!-- Z's coming from hat (red, bold) -->
  <g font-family="'Red Hat Display', 'Helvetica Neue', Arial, sans-serif" font-weight="900">
    <text x="265" y="170" font-size="22" fill="#EE0000" opacity="0.4">z</text>
    <text x="282" y="148" font-size="30" fill="#EE0000" opacity="0.7">Z</text>
    <text x="305" y="120" font-size="40" fill="#EE0000" opacity="1">Z</text>
  </g>

  <!-- Curved text top -->
  <path id="topCurve" d="M 75 200 A 125 125 0 0 1 325 200" fill="none"/>
  <text font-family="'Red Hat Display', 'Helvetica Neue', Arial, sans-serif" 
        font-size="22" font-weight="900" fill="#1a1a1a" letter-spacing="3">
    <textPath href="#topCurve" startOffset="50%" text-anchor="middle">
      SLEEPING THROUGH
    </textPath>
  </text>

  <!-- Disasters at bottom (straight, red for emphasis) -->
  <text x="200" y="320" font-family="'Red Hat Display', 'Helvetica Neue', Arial, sans-serif" 
        font-size="32" font-weight="900" fill="#EE0000" text-anchor="middle" letter-spacing="2">
    DISASTERS
  </text>

  <!-- Decorative dividers -->
  <line x1="135" y1="335" x2="175" y2="335" stroke="#EE0000" stroke-width="1.5"/>
  <line x1="225" y1="335" x2="265" y2="335" stroke="#EE0000" stroke-width="1.5"/>
  <circle cx="200" cy="335" r="2" fill="#EE0000"/>
  
  <!-- Bottom tagline -->
  <text x="200" y="360" font-family="'Red Hat Mono', 'Courier New', monospace" 
        font-size="10" fill="#666" text-anchor="middle" letter-spacing="2.5">
    DR · ACM · GITOPS
  </text>
</svg>
