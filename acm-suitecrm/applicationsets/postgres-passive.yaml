---
# Deploys CloudNativePG standby cluster to the cluster labeled role=passive.
# The standby replicates from the primary via the Skupper VAN.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: suitecrm-postgres-passive
  namespace: openshift-gitops
  labels:
    app.kubernetes.io/part-of: suitecrm-dr
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
    - clusterDecisionResource:
        configMapRef: acm-placement
        labelSelector:
          matchLabels:
            cluster.open-cluster-management.io/placement: suitecrm-passive
        requeueAfterSeconds: 180
  template:
    metadata:
      name: 'suitecrm-postgres-{{.name}}'
      labels:
        app.kubernetes.io/part-of: suitecrm-dr
        suitecrm.io/component: postgres
    spec:
      project: default
      source:
        repoURL: https://github.com/ryannix123/acm-suitecrm.git
        targetRevision: main
        path: clusters/passive/postgres
      destination:
        name: '{{.name}}'
        namespace: suitecrm
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - ServerSideApply=true
        retry:
          limit: 10
          backoff:
            duration: 30s
            maxDuration: 5m
            factor: 2
