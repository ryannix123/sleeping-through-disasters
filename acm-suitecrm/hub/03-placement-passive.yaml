---
# Placement that selects clusters labeled role=passive in the suitecrm-dr ClusterSet.
# Used by ApplicationSets that should only deploy to the passive (DR) cluster.
apiVersion: cluster.open-cluster-management.io/v1beta1
kind: Placement
metadata:
  name: suitecrm-passive
  namespace: openshift-gitops
  labels:
    app.kubernetes.io/part-of: suitecrm-dr
spec:
  clusterSets:
    - suitecrm-dr
  predicates:
    - requiredClusterSelector:
        labelSelector:
          matchLabels:
            role: passive
