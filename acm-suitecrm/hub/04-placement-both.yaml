---
# Placement that selects ALL clusters in the suitecrm-dr ClusterSet.
# Used for things both clusters need: operators, namespaces, RBAC.
apiVersion: cluster.open-cluster-management.io/v1beta1
kind: Placement
metadata:
  name: suitecrm-both
  namespace: openshift-gitops
  labels:
    app.kubernetes.io/part-of: suitecrm-dr
spec:
  clusterSets:
    - suitecrm-dr
  # No predicates means: select everything in the bound ClusterSet
