---
# CloudNativePG primary cluster for the active site.
# This is the read-write source of truth that streams WAL to the standby.
#
# Architecture:
#  - 2 instances within this cluster (1 primary + 1 local synchronous replica)
#    -> Provides RPO=0 for AZ-level failures within the active cluster
#  - Async streaming replication to the passive cluster across Skupper VAN
#    -> Provides ~seconds RPO for region/cluster-level failures
#
# Pod anti-affinity (default in CNPG) ensures the two instances land on
# different worker nodes / availability zones for true redundancy.
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: suitecrm-db
  namespace: suitecrm
  labels:
    app: suitecrm
    app.kubernetes.io/part-of: suitecrm-dr
    suitecrm.io/component: database
    suitecrm.io/role: primary
spec:
  imageName: ghcr.io/cloudnative-pg/postgresql:16.6
  # 2 instances = 1 primary + 1 hot standby
  # CNPG handles intra-cluster failover automatically if the primary pod fails.
  instances: 2

  bootstrap:
    initdb:
      database: suitecrm
      owner: suitecrm

  storage:
    size: 10Gi

  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 2Gi

  postgresql:
    parameters:
      max_connections: "100"
      shared_buffers: "256MB"
      effective_cache_size: "512MB"
      work_mem: "16MB"
      maintenance_work_mem: "128MB"
      checkpoint_completion_target: "0.9"
      wal_buffers: "16MB"
      default_statistics_target: "100"
      random_page_cost: "1.1"
      effective_io_concurrency: "200"
    pg_hba:
      # Allow replication from the standby cluster across the Skupper VAN
      - host replication streaming_replica all scram-sha-256

    # Quorum-based synchronous replication.
    # method: any + number: 1 means: every commit must be acknowledged by
    # at least 1 of the local replicas before returning success to the client.
    # With instances: 2, this enforces synchronous replication to the local
    # standby pod, giving RPO=0 for in-cluster failures.
    #
    # IMPORTANT: This applies ONLY to the local in-cluster replica.
    # The cross-cluster replica (passive site) remains asynchronous to avoid
    # halting writes when the WAN link or passive cluster is degraded.
    synchronous:
      method: any
      number: 1
      # dataDurability: required (default) means writes pause if no sync
      # replica is available. For a 2-instance cluster, that only happens
      # if the standby pod is actively unhealthy. Acceptable trade-off.
      dataDurability: required

  monitoring:
    enablePodMonitor: true
